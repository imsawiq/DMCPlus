name: Mirror MCEF java-cef builds to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download java-cef builds from Keksuccino GitHub mirror
        run: |
          COMMIT="eaeb3d4370aa3526ee237ad1981ad59af3de4dd1"
          DEST="java-cef-builds/${COMMIT}"
          mkdir -p "${DEST}"

          # Keksuccino hosts builds on GitHub releases (not blocked in RU)
          BASE="https://github.com/Keksuccino/mcef_resources/releases/download/java-cef-${COMMIT}"

          # Map MCEF platform names to Keksuccino release asset names
          declare -A PLATFORMS=(
            ["windows-amd64"]="windows_amd64"
            ["linux-amd64"]="linux_amd64"
            ["macos-amd64"]="macos_amd64"
          )

          for MCEF_PLATFORM in "${!PLATFORMS[@]}"; do
            KEK_PLATFORM="${PLATFORMS[$MCEF_PLATFORM]}"
            echo "Downloading ${MCEF_PLATFORM} (from ${KEK_PLATFORM})..."

            curl -fsSL -A "Mozilla/5.0" \
              "${BASE}/${KEK_PLATFORM}.tar.gz" \
              -o "${DEST}/${MCEF_PLATFORM}.tar.gz" || {
              echo "ERROR: Failed to download ${KEK_PLATFORM}.tar.gz"
              exit 1
            }

            curl -fsSL -A "Mozilla/5.0" \
              "${BASE}/${KEK_PLATFORM}.tar.gz.sha256" \
              -o "${DEST}/${MCEF_PLATFORM}.tar.gz.sha256" || {
              echo "ERROR: Failed to download ${KEK_PLATFORM}.tar.gz.sha256"
              exit 1
            }
          done

          ls -lah "${DEST}"

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add java-cef-builds/
          git commit -m "Mirror MCEF java-cef builds from Keksuccino GitHub (commit eaeb3d4)" || echo "Nothing to commit"
          git push origin gh-pages
